spring.application.name=smartcampus

server.port=8089
spring.datasource.url=jdbc:h2:file:./data/smartcampusdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.oauth2.frontend-success-url=http://localhost:3000/Component/Login

# Google OAuth (Web application)
spring.security.oauth2.client.registration.google.client-id=846402458712-sliaipor7qg1fmf78sf4fdurjq0vadjb.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Before starting the backend, set your Google OAuth client secret:
# GOOGLE_CLIENT_SECRET
# Authorized redirect URI in Google Cloud Console:
# http://localhost:8089/login/oauth2/code/google
