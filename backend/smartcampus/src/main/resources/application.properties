spring.application.name=smartcampus

server.port=${SERVER_PORT:8089}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:shared}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.ticket.attachments.dir=uploads/ticket-attachments
app.ticket.attachments.max-per-ticket=3
app.ticket.attachments.max-size-bytes=5242880
app.ticket.attachments.allowed-types=image/jpeg,image/png,image/webp,image/gif

app.oauth2.frontend-success-url=http://localhost:3000/Component/Login

# Google OAuth (Web application)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:846402458712-sliaipor7qg1fmf78sf4fdurjq0vadjb.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Before starting the backend, set your Google OAuth client secret:
# GOOGLE_CLIENT_SECRET
# Authorized redirect URI in Google Cloud Console:
# http://localhost:8089/login/oauth2/code/google
