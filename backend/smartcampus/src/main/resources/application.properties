spring.application.name=smartcampus

server.port=8089

spring.datasource.url=jdbc:mysql://localhost:3306/smartcampusdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Colombo
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.ticket.attachments.dir=uploads/ticket-attachments
app.ticket.attachments.max-per-ticket=3
app.ticket.attachments.max-size-bytes=5242880
app.ticket.attachments.allowed-types=image/jpeg,image/png,image/webp,image/gif

app.oauth2.frontend-success-url=http://localhost:3000/Component/Login

# Google OAuth (Web application)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id-here}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret-here}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# GitHub OAuth (Web application)
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-client-id-here}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-client-secret-here}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.client-name=GitHub
spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user
spring.security.oauth2.client.provider.github.user-name-attribute=id

# Before starting the backend, set your Google OAuth client secret:
# GOOGLE_CLIENT_SECRET
# Before starting the backend, set your GitHub OAuth client secret:
# GITHUB_CLIENT_SECRET
# Authorized redirect URI in Google Cloud Console:
# http://localhost:8089/login/oauth2/code/google
# GitHub OAuth callback URL:
# http://localhost:8089/login/oauth2/code/github