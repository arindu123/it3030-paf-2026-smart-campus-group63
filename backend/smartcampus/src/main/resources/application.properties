spring.application.name=smartcampus

server.port=8089
spring.datasource.url=jdbc:h2:mem:smartcampusdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.oauth2.frontend-success-url=http://localhost:3000/Component/Login

# To enable Google OAuth locally, set these environment variables before starting the backend:
# SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID
# SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET
# Authorized redirect URI in Google Cloud Console:
# http://localhost:8089/login/oauth2/code/google
