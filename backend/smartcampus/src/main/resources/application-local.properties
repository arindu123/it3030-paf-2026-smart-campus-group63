spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smartcampusdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Colombo}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:smartcampus_user}
spring.datasource.password=${DB_PASSWORD:ChangeThisPassword}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
